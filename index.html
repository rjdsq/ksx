            }

        } catch(e) { console.log(e); }

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        cvs.width = cvs.offsetWidth * dpr;
        cvs.height = cvs.offsetHeight * dpr;
        if(ctx) {
            ctx.scale(dpr, dpr);
            gr = ctx.createLinearGradient(0, cvs.offsetHeight, 0, 0);
            gr.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            gr.addColorStop(0.4, 'rgba(212, 175, 55, 0.3)');
            gr.addColorStop(1, 'rgba(212, 175, 55, 0)');
            
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(212, 175, 55, 0.4)';

    function render() {

        const w = cvs.offsetWidth;
        const h = cvs.offsetHeight;

        const len = an.frequencyBinCount;
        const da = new Uint8Array(len);
        an.getByteFrequencyData(da);
        
        const bars = 48;
        const step = Math.floor(len * 0.8 / bars);
        const gap = w / bars;
        const bw = gap * 0.4;
        
        ctx.fillStyle = gr;
        ctx.beginPath();
        
        for(let i = 0; i < bars; i++) {
            let sum = 0;
            for(let j = 0; j < step; j++) {
                sum += da[i * step + j];
            }
            const avg = sum / step;
            const val = (Math.pow(avg / 255, 1.5)) * h * 0.4;
            
            const x = i * gap + gap/2 + 12;
            const y = h - val;
            
            ctx.roundRect(x - bw/2, y, bw, val + 2, 4);
        }

    }

        pi.innerHTML = p 
            ? '<rect x="7" y="6" width="3" height="12" rx="1.5"/><rect x="14" y="6" width="3" height="12" rx="1.5"/>' 
            : '<path d="M5 3l14 9-14 9V3z"/>';
    }

    lb.onclick=()=>{ct.classList.toggle('dense')};
    
    ls.onclick=(e)=>{
        e.stopPropagation();
        if(ml.style.display === 'flex') {
            ml.classList.remove('show');
            setTimeout(()=>ml.style.display='none', 300);
        } else {
            ml.style.display = 'flex';
            requestAnimationFrame(()=>ml.classList.add('show'));
            const act = ml.querySelector('.act');
            if(act) act.scrollIntoView({block:"center"});
        }
    };

    window.addEventListener('click', (e) => {
        if(ml.style.display === 'flex' && !e.target.closest('#list') && !e.target.closest('#ml')) {
            ml.classList.remove('show');
            setTimeout(()=>ml.style.display='none', 300);
        }
    });

    const upd=()=>{
        Array.from(ml.children).forEach((el,i)=>{
            el.className = i===c ? 'mi act' : 'mi';
        });
        if(t[c] && 'mediaSession' in navigator){
            navigator.mediaSession.metadata = new MediaMetadata({
                title: t[c].n, artist: 'KSX ZH',
                artwork: [{ 
  src: './logo/favicon.ico', 
  sizes: '192x192', 
  type: 'image/x-icon' 
}]

            });
            navigator.mediaSession.playbackState = "playing";
        }
    };

    u.onplay = () => {
        setIcon(true);
        ia = true;
        if(!inited) initAudio();
        if(ac && ac.state === 'suspended') ac.resume();
        upd();
    };

    u.onpause = () => { setIcon(false); };

    const pp=()=>{
        if(!t.length)return;
        if(!inited) initAudio();
        if(u.paused){ mp=!1; u.play(); } else { mp=!0; u.pause(); }
    };
    
    let swp = false;
    const ld = (i) => {
        if(!t.length) return;
        swp = true;
        c = (i + t.length) % t.length;
        u.src = t[c].u;
        u.load();
        mp = false;
        let p = u.play();
        if(p !== undefined) p.catch(()=>{});
        setTimeout(() => { swp = false; }, 1000);
    };

    u.onended = () => { 
        if(!swp) ld(c+1); 
    };

    u.ontimeupdate = () => {
        if(u.duration > 0 && u.duration - u.currentTime <= 0.4 && !swp) {
            ld(c+1);
        }
    };

    if(musicFiles.length) {
        t = musicFiles.map(f => ({
            u: `./mp3/${f}`,
            n: f.replace(/\.mp3$/i, '').replace(/[^\u4e00-\u9fa5]/g,'') || f.replace(/\.mp3$/i, '')
        }));
        
        t.forEach((s,i)=>{
            let d=document.createElement('div');
            d.className='mi';
            d.textContent=s.n;
            d.onclick=()=>{ld(i);ml.classList.remove('show');setTimeout(()=>ml.style.display='none',300)};
            ml.appendChild(d);
        });
        u.src = t[0].u; 
        if('mediaSession' in navigator){
            navigator.mediaSession.metadata = new MediaMetadata({
                title: t[0].n, artist: 'KSX ZH',
                artwork: [{ 
  src: './logo/favicon.ico', 
  sizes: '192x192', 
  type: 'image/x-icon' 
}]
            });
        }
    }

    window.addEventListener('popstate', () => {
        v.style.display = 'none';
        lv.style.display = 'none';
        document.body.style.overflow = '';
    });

    const closeViewer = (e) => {
        if (e) {
            e.preventDefault();
            e.stopPropagation();
        }
        if(v.style.display !== 'none' || lv.style.display !== 'none') {
            history.back();
        }
    };

    const extStyle = document.createElement('style');
    extStyle.textContent = `
        @keyframes slideNext { 
            0% { opacity: 0; transform: translateY(15px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }
        @keyframes slidePrev { 
            0% { opacity: 0; transform: translateY(-15px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }
        @keyframes softZoom { 
            0% { opacity: 0; transform: scale(0.98); } 
            100% { opacity: 1; transform: scale(1); } 
        }
    `;
    document.head.appendChild(extStyle);

    let currentImgIndex = -1;
    let vImg = v.querySelector('img');
    if (!vImg) {
        vImg = document.createElement('img');
        v.appendChild(vImg);
    }
    vImg.decoding = 'async';
    li.decoding = 'async';

    const pCache = new Set();
const preloadImage = (idx) => {
    if (!imageFiles.length) return;
    let i = (idx + imageFiles.length) % imageFiles.length;
    const src = `./img/${imageFiles[i]}`;
    if (pCache.has(src)) return;
    const img = new Image();
    img.src = src;
    pCache.add(src);
};

const showImage = (index, dir) => {
    index = (index + imageFiles.length) % imageFiles.length;
    currentImgIndex = index;
    const f = imageFiles[index];
    const imgSrc = `./img/${f}`;
    let target;
    
    if (f.includes('迟来的深情')) {
        v.style.display = 'none';
        li.src = imgSrc;
        lv.style.display = 'block';
        lv.scrollTop = 0;
        target = li;
    } else {
        lv.style.display = 'none';
        vImg.src = imgSrc;
        v.style.display = 'flex';
        target = vImg;
    }

    target.style.animation = 'none';
    void target.offsetWidth;
    //上下滑动时间
    if (dir === 'next') target.style.animation = 'slideNext 0.4s ease-out forwards';
      //点击显示时间
    else if (dir === 'prev') target.style.animation = 'slidePrev 0.4s ease-out forwards';
    else target.style.animation = 'softZoom 0.3s ease-out forwards';
    
    preloadImage(index + 1);
    preloadImage(index - 1);
};

    let startY = 0;
    let startTime = 0;
    let wheelLock = false;

    [v, lv].forEach(el => {
        el.addEventListener('wheel', (e) => {
            if (wheelLock) return;
            if (el === v) {
                e.preventDefault();
                wheelLock = true;
                showImage(currentImgIndex + (e.deltaY > 0 ? 1 : -1), e.deltaY > 0 ? 'next' : 'prev');
                setTimeout(() => { wheelLock = false; }, 400);
            } else if (el === lv) {
                if (e.deltaY > 0 && (lv.scrollHeight - lv.scrollTop - lv.clientHeight <= 5)) {
                    wheelLock = true;
                    showImage(currentImgIndex + 1, 'next');
                    setTimeout(() => { wheelLock = false; }, 400);
                } else if (e.deltaY < 0 && lv.scrollTop <= 5) {
                    wheelLock = true;
                    showImage(currentImgIndex - 1, 'prev');
                    setTimeout(() => { wheelLock = false; }, 400);
                }
            }
        }, {passive: false});

        el.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            startTime = Date.now();
            isSwiping = false;
        }, {passive: true});
        
        el.addEventListener('touchmove', (e) => {
            if (Math.abs(e.touches[0].clientY - startY) > 10) {
                isSwiping = true;
                if (el === v && e.cancelable) e.preventDefault();
            }
        }, {passive: false});
        
        el.addEventListener('touchend', (e) => {
            if (!isSwiping) return; 
            
            let diffY = startY - e.changedTouches[0].clientY;
            let timeTaken = Date.now() - startTime;
            
            if (Math.abs(diffY) > 40 && timeTaken < 500) {
                if (el === v) {
                    showImage(currentImgIndex + (diffY > 0 ? 1 : -1), diffY > 0 ? 'next' : 'prev');
                } else if (el === lv) {
                    if (diffY > 0 && (lv.scrollHeight - lv.scrollTop - lv.clientHeight <= 5)) {
                        showImage(currentImgIndex + 1, 'next');
                    } else if (diffY < 0 && lv.scrollTop <= 5) {
                        showImage(currentImgIndex - 1, 'prev');
                    }
                }
            }
            setTimeout(() => { isSwiping = false; }, 50);
        });
    });

 const renderAllPerfectly = () => {
    if (!imageFiles.length) return;
    const container = document.getElementById('c');
    const frag = document.createDocumentFragment();
    const refreshSvg = `
        <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.3687 13.5827C21.4144 13.3104 21.2306 13.0526 20.9583 13.0069C20.686 12.9612 20.4281 13.1449 20.3825 13.4173L21.3687 13.5827ZM12 20.5C7.30558 20.5 3.5 16.6944 3.5 12H2.5C2.5 17.2467 6.75329 21.5 12 21.5V20.5ZM3.5 12C3.5 7.30558 7.30558 3.5 12 3.5V2.5C6.75329 2.5 2.5 6.75329 2.5 12H3.5ZM12 3.5C15.3367 3.5 18.2252 5.4225 19.6167 8.22252L20.5122 7.77748C18.9583 4.65062 15.7308 2.5 12 2.5V3.5ZM20.3825 13.4173C19.7081 17.437 16.2112 20.5 12 20.5V21.5C16.7077 21.5 20.6148 18.0762 21.3687 13.5827L20.3825 13.4173Z"/>
<path d="M20.4716 2.42157V8.07843H14.8147"></path>
        </svg>`;

    const scrollObs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const w = entry.target;
                if (!w.dataset.triggered) {
                    w.loadImg();
                    w.dataset.triggered = 'true';
                }
                scrollObs.unobserve(w);
            }
        });
    }, { rootMargin: '600px 0px', threshold: 0.01 });

    imageFiles.forEach((fileName, globalIndex) => {
        const isHero = fileName.includes('迟来的深情');
        const w = document.createElement('div');
        w.className = isHero ? 'img-wrap hero' : 'img-wrap';
        w.innerHTML = refreshSvg;
        
        const img = new Image();
        img.decoding = 'async';
        img.loading = 'lazy';
        
        if (globalIndex < 8) {
            img.fetchPriority = "high";
        } else {
            img.fetchPriority = "low";
        }

        w.loadImg = () => {
            w.classList.remove('error', 'loaded');
            img.src = `./img/${fileName}${w.dataset.retry ? '?t=' + Date.now() : ''}`;
            w.dataset.retry = 'true';
            
            img.decode().then(() => {
                w.classList.add('loaded');
            }).catch(() => {
                if(img.complete) w.classList.add('loaded');
            });
        };

        img.onerror = () => {
            w.classList.remove('loaded');
            w.classList.add('error');
            img.removeAttribute('src');
        };

        w.onclick = (e) => {
            if (w.classList.contains('loaded')) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (u.paused && !mp) u.play().catch(() => {});
                history.pushState({modal: true}, null, '');
                document.body.style.overflow = 'hidden';
                showImage(globalIndex, 'none');
            } else if (w.classList.contains('error')) {
                w.loadImg();
            }
        };

        w.appendChild(img);
        frag.appendChild(w);
        scrollObs.observe(w);
    });

    container.appendChild(frag);
    v.onclick = closeViewer;
    lv.onclick = closeViewer;
};
renderAllPerfectly();

    q.onclick=pp;
    b.onclick=()=>{ld(c-1)};
    n.onclick=()=>{ld(c+1)};
    
    document.addEventListener('click',(e)=>{
        if(!inited && t.length) initAudio();
        if(ac && ac.state === 'suspended') ac.resume();
    });
}();
</script>
